upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name hssandbox.ru www.hssandbox.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hssandbox.ru www.hssandbox.ru;

    ssl_certificate     /etc/letsencrypt/live/hssandbox.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hssandbox.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI docs
    location /docs         { proxy_pass http://backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend; proxy_set_header Host $host; }

    # SPA — всё остальное → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
